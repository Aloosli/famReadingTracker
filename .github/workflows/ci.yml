name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Type check
        run: npm run check

  publish-image:
    # Build and push the Docker image to GHCR so the Unraid server can pull it.
    # Only on pushes to main, and only after tests pass.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # GHCR requires a lowercase image name. :latest is what Unraid tracks;
          # the sha tag lets you pin or roll back to a specific build.
          tags: |
            ghcr.io/aloosli/famreadingtracker:latest
            ghcr.io/aloosli/famreadingtracker:sha-${{ github.sha }}
