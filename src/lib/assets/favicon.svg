<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Family Reading Tracker">
	<title>Family Reading Tracker</title>
	<!-- Full-bleed background: iOS rounds the corners itself, and Android's maskable crop stays
	     clear of the books. Colours are the app's own tokens (bg / wood-dark / accent). -->
	<rect width="512" height="512" fill="#f5ead9" />

	<!-- Three books on a shelf, kept to a few chunky shapes so it still reads at favicon size. -->
	<!-- shortest, accent -->
	<rect x="128" y="176" width="80" height="224" rx="12" fill="#c97b4a" />
	<rect x="144" y="208" width="48" height="10" rx="5" fill="#f5ead9" opacity="0.7" />
	<rect x="144" y="230" width="48" height="10" rx="5" fill="#f5ead9" opacity="0.45" />

	<!-- tallest, dark wood -->
	<rect x="216" y="144" width="80" height="256" rx="12" fill="#5c3a24" />
	<rect x="232" y="176" width="48" height="10" rx="5" fill="#e8c9a0" opacity="0.8" />
	<rect x="232" y="198" width="48" height="10" rx="5" fill="#e8c9a0" opacity="0.5" />

	<!-- middle height, warm accent -->
	<rect x="304" y="200" width="80" height="200" rx="12" fill="#e0895a" />
	<rect x="320" y="232" width="48" height="10" rx="5" fill="#f5ead9" opacity="0.7" />
	<rect x="320" y="254" width="48" height="10" rx="5" fill="#f5ead9" opacity="0.45" />

	<!-- the shelf they stand on -->
	<rect x="96" y="400" width="320" height="30" rx="10" fill="#5c3a24" />
</svg>
